<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Name Entry Overlay (visible on load) -->
  <div id="nameOverlay" class="overlay">
    <div class="panel">
      <div class="fish-title">🐟 FISH GAME</div>
      <p class="subtitle">Enter your name to dive in</p>
      <input id="nameInput" type="text" maxlength="18" placeholder="Your name…" autocomplete="off" />
      <button id="diveBtn" class="btn-primary">DIVE IN</button>
      <button id="lbBtn" class="btn-ghost">🏆 Leaderboard</button>
    </div>
  </div>

  <!-- Leaderboard Overlay (hidden by default) -->
  <div id="lbOverlay" class="overlay hidden">
    <div class="panel">
      <div class="fish-title">🏆 LEADERBOARD</div>
      <div id="lbList"></div>
      <button id="lbCloseBtn" class="btn-ghost">← Back</button>
    </div>
  </div>

  <!-- Floating Switch Player Button -->
  <div id="switchBtn">👤 Switch Player</div>

  <canvas id="gameCanvas"></canvas>
  <script src="canvas.js"></script>
  <script src="audio.js"></script>
  <script src="leaderboard.js"></script>
  <script src="entities.js"></script>
  <script src="background.js"></script>
  <script src="hud.js"></script>
  <script src="game.js"></script>
</body>
</html>
